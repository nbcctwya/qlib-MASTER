### MASTER baseline — US SP500 (region: us)
# Paper baseline config. Run with:
#   conda activate qlib-master
#   python run_baseline.py --market sp500            # full: 5 seeds x 40 epochs
#   python run_baseline.py --market sp500 --smoke    # 1 epoch, seed 0 (pipeline check)
#
# US adaptations (MASTER is natively CN-only):
#   - handler class is Alpha158US (us_handlers.py): replaces the $vwap feature (no $vwap bin
#     in us_data) with a typical-price proxy, keeping d_feat=158 and the model architecture intact.
#   - market_data_handler_config passes market_indices=[^gspc, ^dji, ^ndx] so the market-guided
#     gate uses 3 US indices instead of the hardcoded CN ones (same 63-dim structure).
#   - limit_threshold: null (US has no daily price limit); trade_unit auto=1 via region us.
#
# NOTE: keep all dates UNQUOTED — run_baseline.py builds the handler-cache filename
#       via .strftime() on the parsed date (PyYAML only yields datetime.date when unquoted).

qlib_init:
    provider_uri: "~/.qlib/qlib_data/us_data"
    region: us
market: &market sp500
benchmark: &benchmark "^gspc"

data_handler_config: &data_handler_config
    start_time: 2008-01-01
    end_time: 2025-12-31
    fit_start_time: 2009-01-01
    fit_end_time: 2020-12-31
    instruments: *market
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label
    label: ["Ref($close, -5) / Ref($close, -1) - 1"]

market_data_handler_config: &market_data_handler_config
    start_time: 2008-01-01
    end_time: 2025-12-31
    fit_start_time: 2009-01-01
    fit_end_time: 2020-12-31
    instruments: *market
    market_indices: ["^gspc", "^dji", "^ndx"]   # US indices for the market-guided gate
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 30
            n_drop: 5
    backtest:
        start_time: 2023-01-01
        end_time: 2025-12-31
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: null    # US has no daily price limit
            deal_price: close
            open_cost: 0.0005        # buy  cost = 万分之五
            close_cost: 0.0015       # sell cost = 万分之十五
            min_cost: 5

task:
    model:
        class: MASTERModel
        module_path: qlib.contrib.model.pytorch_master_ts
        kwargs:
            seed: 0                  # overridden per-seed by run_baseline.py
            d_feat: 158
            d_model: 256
            t_nhead: 4
            s_nhead: 2
            gate_input_start_index: 158
            gate_input_end_index: 221
            T_dropout_rate: 0.5
            S_dropout_rate: 0.5
            n_epochs: 40
            lr: 0.000008
            train_stop_loss_thred: 0.95
            GPU: 0
            market: *market          # beta auto -> 5 for non-csi300
            benchmark: *benchmark
            save_prefix: *market
    dataset:
        class: MASTERTSDatasetH
        module_path: qlib.contrib.data.dataset
        kwargs:
            handler:
                class: Alpha158US
                module_path: us_handlers
                kwargs: *data_handler_config
            segments:
                train: [2009-01-01, 2020-12-31]
                valid: [2021-01-01, 2022-12-31]
                test: [2023-01-01, 2025-12-31]
            step_len: 8
            market_data_handler_config: *market_data_handler_config
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
              model: <MODEL>
              dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
              ana_long_short: False
              ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
              config: *port_analysis_config
